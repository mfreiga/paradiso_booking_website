# Local development database for the Paradiso booking app.
#   Start:  docker compose up -d
#   Stop:   docker compose down
#   Reset:  docker compose down -v   (deletes all data)
services:
  db:
    image: postgres:16
    container_name: paradiso-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: paradiso
      POSTGRES_PASSWORD: paradiso
      POSTGRES_DB: paradiso
    ports:
      - "5432:5432"
    volumes:
      - paradiso-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paradiso -d paradiso"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  paradiso-db-data:
